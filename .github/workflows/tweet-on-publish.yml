# Auto-post to @Neural_Bridge_ when a new post or research paper is published.
#
# Triggers:
#   - push to main (auto-detect newly added/modified content files)
#   - manual run via the Actions tab (specify a file path optionally)
#
# Required secrets (Repo Settings -> Secrets and variables -> Actions):
#   TWITTER_APP_KEY        — Consumer Key from Twitter Developer Portal
#   TWITTER_APP_SECRET     — Consumer Secret
#   TWITTER_ACCESS_TOKEN   — Access Token (generated for your account)
#   TWITTER_ACCESS_SECRET  — Access Token Secret
#
# Behavior:
#   - Skips drafts (draft: true in frontmatter)
#   - Skips posts older than 7 days (avoids re-tweeting edits to old posts)
#   - Tweets format: "🆕 {title}\n\n{description}\n\n{url}" (truncated to 280)
#   - Research papers tweeted as "📄 New research: {title}..."

name: Cross-post to Twitter

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**.mdx'
      - 'src/content/posts/**.md'
      - 'src/content/research/**.mdx'
      - 'src/content/research/**.md'
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Content file path (e.g. src/content/posts/foo.mdx). Empty = auto-detect from latest commit.'
        required: false
        type: string

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save gray-matter twitter-api-v2

      - name: Detect content files to tweet
        id: detect
        shell: bash
        run: |
          # Allow opting out of tweet via [skip-tweet] in commit message
          if [ -z "${{ github.event.inputs.post_file }}" ] && git log -1 --pretty=%B | grep -qF '[skip-tweet]'; then
            echo "Commit message contains [skip-tweet], skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -n "${{ github.event.inputs.post_file }}" ]; then
            echo "${{ github.event.inputs.post_file }}" > files.txt
          else
            git diff --name-only --diff-filter=AM HEAD^ HEAD \
              | grep -E '^src/content/(posts|research)/.*\.(md|mdx)$' \
              > files.txt || true
          fi
          if [ ! -s files.txt ]; then
            echo "No content files to process"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Files to process:"
            cat files.txt
          fi

      - name: Post to Twitter
        if: steps.detect.outputs.skip != 'true'
        env:
          TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
          TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          # Pass each file path as a separate argument
          xargs -a files.txt node .github/scripts/post-to-twitter.mjs
