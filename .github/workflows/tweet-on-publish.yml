# Draft a tweet for @Neural_Bridge_ when a new post or research paper is published.
#
# This workflow does NOT post to X directly. The X API moved to a metered
# credits model and the @Neural_Bridge_ account has no posting credits on
# its current tier. Instead, this workflow:
#   1. Builds the tweet text it would have posted
#   2. Adds it to the run summary (visible on the Actions run page)
#   3. Opens a GitHub issue labeled `tweet-draft` with the text in the body,
#      so it lands in your inbox as a "post this manually" reminder
#
# Triggers:
#   - push to main (auto-detect newly added/modified content files)
#   - manual run via the Actions tab
#
# Behavior:
#   - Skips drafts (draft: true in frontmatter)
#   - Skips posts older than 7 days
#   - Honors `[skip-tweet]` in the commit message
#   - Format: "🆕 {title}\n\n{description}\n\n{url}" (truncated to 280)
#   - Research papers prefixed with "📄 New research:"

name: Draft tweet on publish

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**.mdx'
      - 'src/content/posts/**.md'
      - 'src/content/research/**.mdx'
      - 'src/content/research/**.md'
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Content file path (e.g. src/content/posts/foo.mdx). Empty = auto-detect from latest commit.'
        required: false
        type: string

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save gray-matter

      - name: Detect content files to draft
        id: detect
        shell: bash
        run: |
          # Allow opting out via [skip-tweet] in commit message
          if [ -z "${{ github.event.inputs.post_file }}" ] && git log -1 --pretty=%B | grep -qF '[skip-tweet]'; then
            echo "Commit message contains [skip-tweet], skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -n "${{ github.event.inputs.post_file }}" ]; then
            echo "${{ github.event.inputs.post_file }}" > files.txt
          else
            git diff --name-only --diff-filter=AM HEAD^ HEAD \
              | grep -E '^src/content/(posts|research)/.*\.(md|mdx)$' \
              > files.txt || true
          fi
          if [ ! -s files.txt ]; then
            echo "No content files to process"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Files to process:"
            cat files.txt
          fi

      - name: Draft tweet and open issue
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          xargs -a files.txt node .github/scripts/draft-tweet.mjs
