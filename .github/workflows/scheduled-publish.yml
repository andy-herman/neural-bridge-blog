# Scheduled publishing.
#
# Once a week (Tuesday 01:00 UTC ≈ Monday 17:00 PST / 18:00 PDT), find
# one queued article (draft: true) whose pubDate has arrived, flip it
# to published, push the change, and draft a tweet (as a GitHub issue
# for manual posting). Vercel auto-deploys on push to main.
#
# Pairs with `prepare_week.py` in the neural-bridge repo, which runs
# Sunday 18:00 PT and generates LinkedIn + X drafts in the Obsidian
# vault so Andy can review them ahead of Monday's flip.
#
# Queue an article by setting:
#   draft: true
#   pubDate: 2026-05-18   # the Monday it should publish
# in its frontmatter and pushing. The cron picks it up on the Tuesday
# UTC run that follows that Monday (or any later run if backlogged).
#
# If multiple drafts qualify on the same run, the oldest pubDate wins.
# The remaining drafts wait until the next Monday.
#
# Manual run via the Actions tab is also supported.

name: Scheduled publish

on:
  schedule:
    - cron: '0 1 * * 2'  # Tuesday 01:00 UTC = Monday 17:00 PST / 18:00 PDT
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save gray-matter

      - name: Find and flip a scheduled draft
        id: publish
        run: node .github/scripts/scheduled-publish.mjs

      - name: Commit and push the publish flip
        if: steps.publish.outputs.file != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.publish.outputs.file }}"
          git commit -m "Publish: ${{ steps.publish.outputs.title }} [skip-tweet]"
          git push

      - name: Wait for Vercel deploy
        if: steps.publish.outputs.file != ''
        run: sleep 60

      - name: Draft tweet and open issue
        if: steps.publish.outputs.file != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: node .github/scripts/draft-tweet.mjs "${{ steps.publish.outputs.file }}"
